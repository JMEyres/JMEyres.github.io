<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Me | Josh Eyres</title>
  <link rel="stylesheet" href="CSS/style.css" />
  <link rel="icon" type="image/png" href="Images/favicon-32x32.png">
</head>
<body>
  <!-- Simplified banner -->
  <header class="simple-header">
    <div class="logo">
      <a href="index.html">
        <img src="Images/Logo.jpg" alt="Josh Eyres Logo">
      </a>
    </div>
    <nav class="hero-links">
      <a href="./portfolio.html">Portfolio</a>
      <a href="./about.html">About</a>
      <a href="./hobbies.html">Hobbies</a>
      <a href="./cv.html">CV</a>
      <a href="./contact.html">Contact</a>
    </nav>
  </header>

  <!-- Page content -->
  <main>
    <div class="contact-container">
      <h2>// SYSTEM_CONTACT_PIPELINE</h2>
      
      <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
        <input type="hidden" name="access_key" value="f50d1c18-7157-47b6-a225-8baa891e3af3">

        <div class="form-group">
          <label for="name">_IDENT_NAME</label>
          <input type="text" id="name" name="name" required placeholder="Enter name...">
        </div>

        <div class="form-group">
          <label for="email">_IDENT_EMAIL</label>
          <input type="email" id="email" name="email" required placeholder="Enter email...">
        </div>

        <div class="form-group">
          <label for="message">_COMMS_BODY</label>
          <textarea id="message" name="message" required placeholder="Type message payload..."></textarea>
        </div>

        <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

        <button type="submit" class="form-submit-btn">TRANSMIT_MSG</button>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Josh Eyres. All rights reserved.</p>
  </footer>
</body>
</html>
