<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Title | Josh Eyres</title>
  <link rel="stylesheet" href="CSS/style.css" />
  <link rel="icon" type="image/png" href="Images/favicon-32x32.png">
</head>
<body>
  <!-- Simplified banner -->
  <header class="simple-header">
    <div class="logo">
      <a href="index.html">
        <img src="Images/Logo.jpg" alt="Josh Eyres Logo">
      </a>
    </div>
    <nav class="hero-links">
      <a href="./portfolio.html">Portfolio</a>
      <a href="./about.html">About</a>
      <a href="./hobbies.html">Hobbies</a>
      <a href="./cv.html">CV</a>
      <a href="./contact.html">Contact</a>
    </nav>
  </header>

  <!-- Page content -->
<main class="explorer-layout">
  <aside class="project-directory">
    <div class="directory-header">C:\PROJECTS\A-Z</div>
    <div class="search-box">
      <input type="text" id="project-search" placeholder="Search directory..." autocomplete="off">
    </div>
    <ul id="project-list" class="file-list">
      </ul>
  </aside>

  <section class="project-view">
    <div class="retro-window" id="window-container">
      <div class="titlebar">
        <span class="title-text" id="proj-title">System Idle...</span>
      </div>
      <div class="window-content" id="window-content-main"> <img src="" id="proj-icon" class="win-icon" alt="">
          <h1 id="proj-header">Select a File</h1>
          <p id="proj-desc">Initialize a project from the directory to view data.</p>
          <img src="" id="proj-img">
          
          <div id="gallery-area" class="gallery-container"></div> 
          
          <div id="tag-list" class="tag-container"></div>
      </div>
    </div>
  </section>
</main>

  <footer>
    <p>&copy; 2025 Josh Eyres. All rights reserved.</p>
  </footer>
</body>
</html>

<script src="projects.js"></script>

<script>
  const listContainer = document.getElementById('project-list');
const searchInput = document.getElementById('project-search');

// --- 1. SEARCH LOGIC ---
searchInput.addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const items = listContainer.getElementsByTagName('li');

    Array.from(items).forEach(item => {
        // We look at the link text inside the li
        const title = item.textContent.toLowerCase();
        item.style.display = title.includes(term) ? 'block' : 'none';
    });
});

// --- 2. UPDATE UI FUNCTION ---

  function loadProject(id) {
    const data = projects[id];
    if (!data) return;

    const mainImg = document.getElementById('proj-img');
    const galleryArea = document.getElementById('gallery-area');

    // --- 1. Handle Main Data ---
    document.getElementById('proj-title').innerText = data.title;
    document.getElementById('proj-header').innerText = data.title;
    document.getElementById('proj-desc').innerText = data.description;
    document.getElementById('proj-icon').src = data.icon || '';

    // --- 2. Handle the Main Image ---
    if (data.imgPath) {
        mainImg.src = data.imgPath;
        mainImg.style.display = "block";
        mainImg.style.opacity = "0"; // Start hidden for fade-in
        
        mainImg.onload = function() {
            mainImg.style.opacity = "1";
        };

        // Update the CSS Background variable for the glass effect
        document.getElementById('window-container').style.setProperty('--window-bg', `url('${data.imgPath}')`);
    } else {
        mainImg.style.display = "none";
        document.getElementById('window-container').style.setProperty('--window-bg', 'none');
    }

    // --- 3. Handle Gallery Images ---
    galleryArea.innerHTML = ''; // Clear old gallery

    if (data.gallery && data.gallery.length > 0) {
        data.gallery.forEach(src => {
            const extraImg = document.createElement('img');
            extraImg.src = src;
            extraImg.className = "gallery-thumb";
            extraImg.onclick = () => window.open(src, '_blank');
            galleryArea.appendChild(extraImg); // Append to the new gallery-area div
        });
    }

  // --- 4. Update URL ---
  window.history.pushState(null, '', `?id=${id}`);
}

// --- 3. BUILD DIRECTORY ---
Object.keys(projects).forEach(key => {
    const listItem = document.createElement('li');
    const project = projects[key];
    
    const link = document.createElement('a');
    link.href = `?id=${key}`;
    link.className = "sidebar-link";
    link.innerText = project.dirTitle;

    // Intercept clicks to prevent page flicker/reload
    link.addEventListener('click', (e) => {
        e.preventDefault(); 
        loadProject(key);
    });

    listItem.appendChild(link);
    listContainer.appendChild(listItem);
});

// --- 4. INITIAL LOAD ---
window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const initialId = params.get('id');
    if (initialId && projects[initialId]) {
        loadProject(initialId);
    }
};
</script>
