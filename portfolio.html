<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Title | Josh Eyres</title>
  <link rel="stylesheet" href="CSS/style.css" />
  <link rel="icon" type="image/png" href="Images/favicon-32x32.png">
</head>
<body>
  <!-- Simplified banner -->
  <header class="simple-header">
    <div class="logo">
      <a href="index.html">
        <img src="Images/Logo.jpg" alt="Josh Eyres Logo">
      </a>
    </div>
    <nav class="hero-links">
      <a href="./portfolio.html">Portfolio</a>
      <a href="./about.html">About</a>
      <a href="./hobbies.html">Hobbies</a>
      <a href="./cv.html">CV</a>
      <a href="./contact.html">Contact</a>
    </nav>
  </header>

  <!-- Page content -->
<main class="explorer-layout">
  <aside class="project-directory">
    <div class="directory-header">C:\PROJECTS\A-Z</div>
    <div class="search-box">
      <input type="text" id="project-search" placeholder="Search directory..." autocomplete="off">
    </div>
    <ul id="project-list" class="file-list">
      </ul>
  </aside>

  <section class="project-view">
    <div class="retro-window" id="window-container">
      <div class="titlebar">
        <span class="title-text" id="proj-title">System Idle...</span>
      </div>
      <div class="window-content">
        <img src="" id="proj-icon" class="win-icon" alt="">
        <h1 id="proj-header">Select a File</h1>
        <p id="proj-desc">Initialize a project from the directory to view data.</p>
        <img src="" id="proj-img">
        <div id="tag-list" class="tag-container"></div>
      </div>
    </div>
  </section>
</main>

  <footer>
    <p>&copy; 2025 Josh Eyres. All rights reserved.</p>
  </footer>
</body>
</html>

<script src="projects.js"></script>

<script>
  const listContainer = document.getElementById('project-list');
const searchInput = document.getElementById('project-search');

// --- 1. SEARCH LOGIC ---
searchInput.addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const items = listContainer.getElementsByTagName('li');

    Array.from(items).forEach(item => {
        // We look at the link text inside the li
        const title = item.textContent.toLowerCase();
        item.style.display = title.includes(term) ? 'block' : 'none';
    });
});

// --- 2. UPDATE UI FUNCTION ---
function loadProject(id) {
    const data = projects[id];
    if (!data) return;

    const projImg = document.getElementById('proj-img');

    // 1. Hide the image slightly so the "swap" is invisible
    projImg.style.opacity = "0";

    // 2. Set the new data
    document.getElementById('proj-title').innerText = data.title;
    document.getElementById('proj-header').innerText = data.title;
    document.getElementById('proj-desc').innerText = data.description;
    document.getElementById('proj-icon').src = data.icon;

    // 3. Wait for the image to actually LOAD before showing it
    projImg.onload = function() {
        projImg.style.opacity = "1";
    };
    
    projImg.src = data.imgPath;

    // Update background variable
    document.getElementById('window-container').style.setProperty('--window-bg', `url('${data.imgPath}')`);
    window.history.pushState(null, '', `?id=${id}`);
}

// --- 3. BUILD DIRECTORY ---
Object.keys(projects).forEach(key => {
    const listItem = document.createElement('li');
    const project = projects[key];
    
    const link = document.createElement('a');
    link.href = `?id=${key}`;
    link.className = "sidebar-link";
    link.innerText = project.title;

    // Intercept clicks to prevent page flicker/reload
    link.addEventListener('click', (e) => {
        e.preventDefault(); 
        loadProject(key);
    });

    listItem.appendChild(link);
    listContainer.appendChild(listItem);
});

// --- 4. INITIAL LOAD ---
window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const initialId = params.get('id');
    if (initialId && projects[initialId]) {
        loadProject(initialId);
    }
};
</script>
